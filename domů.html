<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Projekt X</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0f172a;
  color: white;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 25px 60px;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(6px);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.navbar b {
  font-size: 26px;
  letter-spacing: 1px;
}

.menu a {
  margin: 0 18px;
  color: #cbd5e1;
  text-decoration: none;
  font-weight: 300;
  transition: 0.2s;
}

.menu a:hover {
  color: white;
}

/* HERO */
.hero {
  text-align: center;
  margin-top: 140px;
}

.hero h1 {
  font-size: 65px;
  font-weight: 600;
}

.hero span {
  color: #38bdf8;
}

.hero p {
  font-size: 20px;
  color: #94a3b8;
  margin-top: -10px;
}

/* BUTTONY */
.btn {
  padding: 14px 28px;
  margin: 12px;
  border: none;
  cursor: pointer;
  border-radius: 10px;
  font-size: 17px;
  transition: 0.25s;
}

.btn a {
  color: inherit;
  text-decoration: none;
}

.btn-dark {
  background: #1e293b;
  color: white;
  border: 1px solid #334155;
}

.btn-dark:hover {
  background: #334155;
  transform: translateY(-3px);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div>
    <b>Projekt X</b>
  </div>

  <div class="menu">
    <a href="Untitled-1.html">💻 Home</a> 
    <a href="pravidla.html">📚 Pravidla</a>
    <a href="team.html">🎓 Staff Team</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Vítej na <span>Projekt X</span></h1>
  <p>Začínající ER:LC roleplay server</p>

  <button class="btn btn-dark">
    <a href="https://www.roblox.com/games/2534724415/Emergency-Response-Liberty-County">Připojit se do hry</a>
  </button>

  <button class="btn btn-dark">
    <a href="https://discord.gg/2XBngSsFer">Připojit se na Discord</a>
  </button>
</div>

</body>
</html>
